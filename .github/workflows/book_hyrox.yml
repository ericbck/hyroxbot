name: HYROX Auto-Book

on:
  schedule:
    # Every Sunday at 10:00 CET (= 08:00 UTC in summer / CEST)
    - cron: "0 8 * * 0"
  workflow_dispatch: {}   # allow manual trigger from GitHub UI

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit skip.txt reset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run booking script
        run: python book_hyrox.py

      - name: Reset skip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skip.txt
          git diff --cached --quiet || git commit -m "chore: reset skip.txt"
          git push

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: booking-screenshot
          path: booking_result.png
          if-no-files-found: ignore
