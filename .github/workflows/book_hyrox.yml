name: HYROX Auto-Book

on:
  schedule:
    # Every Sunday at 10:00 CET (= 08:00 UTC in summer / CEST)
    - cron: "5 8 * * 0"
  workflow_dispatch: {}   # allow manual trigger from GitHub UI

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit skip.txt reset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture timestamp
        id: ts
        run: echo "now=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Send trigger notification
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "HYROX Bot <onboarding@resend.dev>",
              "to": ["eric.baack@outlook.de", "yasminsahin@outlook.de"],
              "subject": "HYROX Bot triggered — ${{ github.run_id }}",
              "text": "The HYROX auto-booking script has been triggered.\n\nTimestamp (UTC): ${{ steps.ts.outputs.now }}\nTriggered by:    ${{ github.event_name }}\nWorkflow:        ${{ github.workflow }}\nBranch:          ${{ github.ref_name }}\nRun URL:         https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nParticipants being booked:\n  - Eric Baack (eric.baack@outlook.com)\n  - Yasmin Sahin (yasminsahin@outlook.de)\n\nThe script will attempt to book HYROX Performance 18:30 for next Monday."
            }'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run booking script
        run: python book_hyrox.py

      - name: Reset skip.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skip.txt
          git diff --cached --quiet || git commit -m "chore: reset skip.txt"
          git push

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: booking-screenshot
          path: booking_result.png
          if-no-files-found: ignore
